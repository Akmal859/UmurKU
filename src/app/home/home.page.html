<ion-content [fullscreen]="true">
  <div class="blob-1"></div>
  <div class="blob-2"></div>

  <div class="main-container">
    <header>
      <h1 class="brand">Umur<span>KU</span></h1>
      <p class="subtitle">Analisis mendalam waktu hidupmu</p>
    </header>

    <div class="glass-input-card">
      <div class="input-group">
        <label>Kapan hari istimewamu?</label>
        <div class="input-wrapper" (click)="openDatePicker()">
          <ion-icon name="gift-outline"></ion-icon>
          <!-- Tampilan placeholder / tanggal yang dipilih -->
          <div class="date-display" [class.has-value]="birthDate">
            <span class="date-placeholder" *ngIf="!birthDate">dd / mm / yyyy</span>
            <span class="date-value" *ngIf="birthDate">{{ getFormattedDate() }}</span>
          </div>
          <ion-icon name="calendar-outline" class="calendar-icon"></ion-icon>
          <!-- Input date native tersembunyi, dipanggil lewat openDatePicker() -->
          <input
            #nativeDateInput
            type="date"
            class="hidden-date-input"
            [value]="birthDate"
            (change)="onNativeDateChange($event)"
            max="{{ todayStr }}">
        </div>
      </div>
      <button class="prime-button" (click)="calculateAge()">
        Cek Rahasia Umurku
      </button>
    </div>

    <div *ngIf="ageYears !== null" class="results-wrapper">
      <div class="extra-info-grid">
        <div class="info-box">
          <ion-icon name="star-outline"></ion-icon>
          <p>ZODIAK</p>
          <h3>{{ zodiacSign }}</h3>
        </div>
        <div class="info-box">
          <ion-icon name="balloon-outline"></ion-icon>
          <p>ULTAH</p>
          <h3>{{ nextBirthdayDays }} <span>Hari lagi</span></h3>
        </div>
      </div>

      <div class="main-age-display">
        <span class="big-number">{{ ageYears }}</span>
        <span class="big-label">TAHUN TERLEWATI</span>
      </div>

      <div class="detail-grid">
        <div class="detail-box">
          <span class="num">{{ ageMonths }}</span>
          <span class="lab">Bulan</span>
        </div>
        <div class="detail-box">
          <span class="num">{{ ageDays }}</span>
          <span class="lab">Hari</span>
        </div>
      </div>

      <div class="fun-fact-card">
        <ion-icon name="leaf-outline"></ion-icon>
        <div class="fact-text">
          <p>Tahukah kamu?</p>
          <span>Anda telah bernapas ±<b>{{ breathCount | number }}</b> kali.</span>
        </div>
      </div>
    </div>
  </div>
</ion-content>
